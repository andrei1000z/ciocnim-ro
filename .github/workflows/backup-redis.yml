name: Backup Redis (every 10 min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: backup-redis
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dump Redis
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/backup-redis.mjs

      - name: Compress
        run: gzip -9 backup.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-backup-${{ github.run_id }}
          path: backup.json.gz
          retention-days: 7
